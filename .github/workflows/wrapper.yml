name: Generate Gradle Wrapper (9.2.1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle 9.2.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "9.2.1"

      - name: Generate wrapper (9.2.1)
        run: gradle wrapper --gradle-version 9.2.1

      - name: Commit wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.properties gradle/wrapper/gradle-wrapper.jar
          git commit -m "Add Gradle 9.2.1 wrapper" || echo "No changes"
          git push
